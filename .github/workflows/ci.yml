name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - name: Validate clinical-only migrations
        shell: bash
        run: |
          test -n "$(find supabase/migrations -maxdepth 1 -name '*.sql' -print -quit)"
          ! grep -RniE 'invoice|payment|billing|revenue|discount' supabase/migrations
